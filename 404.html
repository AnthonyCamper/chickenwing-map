<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WingKingTony</title>
    <script>
      // GitHub Pages SPA redirect: encode the full path into a query param
      // so index.html can restore it with history.replaceState.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
